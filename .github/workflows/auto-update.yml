name: Auto-update site

on:
  schedule:
    # Päivittäin 05:00 UTC (= 07:00 Suomi talviaika, 08:00 kesäaika).
    # Käynnistyy ennen aamua niin sivu on tuore kun perhe avaa.
    - cron: '0 5 * * *'
  workflow_dispatch:  # mahdollistaa käsin ajamisen GitHubin web-UI:sta

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sanity-check reseptit.json (estä mojibake-vika ennen ajoa)
        run: |
          python3 - <<'PY'
          import json, sys
          with open("reseptit.json", encoding="utf-8") as f:
              d = json.load(f)
          paivalliset = [r for r in d.get("reseptit", []) if r.get("kategoria") == "päivällinen"]
          if len(paivalliset) < 5:
              # Listaa todelliset kategoriat että saadaan diagnoosi heti virheviestiin
              from collections import Counter
              kategoriat = Counter(r.get("kategoria", "?") for r in d.get("reseptit", []))
              sys.exit(
                  f"FAIL: reseptit.json sisältää vain {len(paivalliset)} päivällisreseptiä. "
                  f"Algoritmi tarvitsee vähintään 5 (mielellään 15). "
                  f"Kategoriat: {dict(kategoriat)}. "
                  f"Tarkista UTF-8-enkoodaus — jos kategoriat näkyvät 'pÃ¤ivÃ¤llinen' "
                  f"'päivällinen' sijaan, tiedosto on mojibake-vikainen."
              )
          print(f"✓ {len(paivalliset)} päivällisreseptiä löytyi")
          PY

      - name: Run update_in_place.py
        run: python3 update_in_place.py

      - name: Sanity-check generoitu index.html (ensi vk + 2 vk päästä ehdotukset täysin)
        run: |
          python3 - <<'PY'
          import re, sys
          html = open("index.html", encoding="utf-8").read()
          # Tarkista että w3 (ensi vk) ja w4 (+2 vk) ma-pe + su -päivällissolut on täytetty.
          # Algoritmi täyttää 5 arkipäivää + sunnuntain per viikko (la = ylijäämät = tyhjä).
          # w1 (edellinen) ja w2 (kuluva) tulevat last_cooked-toteumasta — saavat olla tyhjiä.
          paivat_taytettavat = ["ma", "ti", "ke", "to", "pe", "su"]
          tayttoja = 0
          for vk in ("w3", "w4"):
              for p in paivat_taytettavat:
                  m = re.search(
                      rf'data-k="{vk}-d-{p}"[^>]*>([\s\S]*?)</div>',
                      html
                  )
                  if m and "<strong>" in m.group(1):
                      tayttoja += 1
          if tayttoja < 8:
              sys.exit(
                  f"FAIL: w3+w4 (ma-pe+su) päivällissolut sisältävät vain {tayttoja}/12 ehdotusta. "
                  f"Algoritmi ei tuota riittävästi reseptejä — ei pushata."
              )
          print(f"✓ {tayttoja}/12 w3+w4 ma-pe+su päivällissolua täytetty (ehdotukset)")
          PY

      - name: Sanity-check loppumerkit (estää katkaistun index.html pushin)
        run: |
          python3 - <<'PY'
          import sys
          html = open("index.html", encoding="utf-8").read()
          # Tarkista että tiedosto päättyy oikeisiin sulkutageihin. Jos lähtötiedosto
          # tai update_in_place.py:n tuottama lopputulos on katkaistu jossakin
          # vaiheessa (esim. OneDrive-sync-ongelman vuoksi), estetään push tähän.
          tail = html.rstrip()[-40:]
          if "</html>" not in html[-200:] or "</body>" not in html[-300:]:
              # Näytä missä loppu on, jotta diagnoosi onnistuu virhelogista
              sys.exit(
                  f"FAIL: index.html ei pääty </html>/</body>-tageihin. "
                  f"Tiedosto on todennäköisesti katkaistu. "
                  f"Tiedoston viimeiset 200 merkkiä:\n{html[-200:]!r}"
              )
          print(f"✓ index.html päättyy oikein ({len(html)} tavua)")
          tap_html = open("tapahtumat.html", encoding="utf-8").read()
          if "</html>" not in tap_html[-200:]:
              sys.exit(
                  f"FAIL: tapahtumat.html ei pääty </html>-tagiin. "
                  f"Viimeiset 200 merkkiä:\n{tap_html[-200:]!r}"
              )
          print(f"✓ tapahtumat.html päättyy oikein ({len(tap_html)} tavua)")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Auto-update: $(date -u +%Y-%m-%d) (tapahtumat, päiväkoti, vk3-ehdotukset)"
            git push
            echo "✓ Pushed"
          else
            echo "✓ No changes"
          fi
