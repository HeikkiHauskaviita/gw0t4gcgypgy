name: Auto-update site

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update_in_place.py
        run: python3 update_in_place.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Auto-update: $(date -u +%Y-%m-%d) (tapahtumat, päiväkoti, vk3-ehdotukset)"
            git push
            echo "✓ Pushed"
          else
            echo "✓ No changes"
          fi
