<title>Tampereen perhetapahtumat</title>

<style>
  :root {
    --bg: #0a0612;
    --bg-2: #140a22;
    --surface: #1a102a;
    --surface-2: #22143a;
    --ink: #ede4cc;
    --ink-dim: #b8a885;
    --muted: #7a6a4a;
    --gold: #d4a94a;
    --gold-bright: #f0c76a;
    --gold-dim: #8a6f30;
    --blood: #8b1e2b;
    --purple: #4a2b6e;
    --border: rgba(212, 169, 74, 0.22);
    --border-strong: rgba(212, 169, 74, 0.5);
    --shadow: 0 2px 10px rgba(0,0,0,0.6), 0 0 30px rgba(74, 43, 110, 0.18);
    --bg-glow-1: rgba(74, 43, 110, 0.4);
    --bg-glow-2: rgba(139, 30, 43, 0.28);
    --bg-glow-3: rgba(26, 16, 42, 0.4);
    --nav-bg: linear-gradient(180deg, rgba(10,6,18,0.98), rgba(20,10,34,0.95));
  }
  /* ====== VAALEA TEEMA ("pergamentti") ===================== */
  :root[data-theme="light"] {
    --bg: #efe4c4;
    --bg-2: #e3d6b2;
    --surface: #f5ebd0;
    --surface-2: #e8dcb8;
    --ink: #2a1f10;
    --ink-dim: #5a4625;
    --muted: #8a7855;
    --gold: #8d6b00;
    --gold-bright: #b8901c;
    --gold-dim: #c9b078;
    --blood: #6b1820;
    --purple: #4a2b6e;
    --border: rgba(141, 107, 0, 0.32);
    --border-strong: rgba(141, 107, 0, 0.55);
    --shadow: 0 2px 10px rgba(60, 40, 0, 0.12), 0 0 30px rgba(141, 107, 0, 0.06);
    --bg-glow-1: rgba(141, 107, 0, 0.10);
    --bg-glow-2: rgba(107, 24, 32, 0.07);
    --bg-glow-3: rgba(229, 220, 184, 0.50);
    --nav-bg: linear-gradient(180deg, rgba(253, 246, 220, 0.97), rgba(245, 235, 208, 0.95));
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background:
      radial-gradient(ellipse at 18% -10%, var(--bg-glow-1), transparent 55%),
      radial-gradient(ellipse at 82% 110%, var(--bg-glow-2), transparent 55%),
      radial-gradient(ellipse at 50% 50%, var(--bg-glow-3), transparent 70%),
      var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', 'Garamond', 'Palatino Linotype', Palatino, Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ========== Site-nav (sivujen välinen) ========== */
  
  
  
  

  header {
    background: linear-gradient(180deg, rgba(26,16,42,0.97), rgba(10,6,18,0.93));
    border-bottom: 1px solid var(--border-strong);
    padding: 24px 28px 20px;
    position: sticky; top: 42px; z-index: 10;
    box-shadow: 0 10px 28px rgba(0,0,0,0.55), inset 0 -1px 0 rgba(212,169,74,0.1);
  }
  header h1 {
    margin: 0 0 18px 0;
    font-family: 'Cinzel', 'Trajan Pro', Georgia, serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    color: var(--gold);
    text-shadow: 0 0 22px rgba(212, 169, 74, 0.35), 0 0 2px rgba(0,0,0,0.6);
  }
  header h1 .sigil {
    color: var(--gold-dim);
    margin: 0 18px;
    font-size: 22px;
    display: inline-block;
    vertical-align: middle;
    font-weight: normal;
    animation: sigilPulse 4.5s ease-in-out infinite;
  }
  header h1 .sigil:last-child { animation-delay: 2.2s; }
  @keyframes sigilPulse{
    0%, 100% { text-shadow: 0 0 6px rgba(212, 169, 74, 0.25); color: var(--gold-dim); }
    50% { text-shadow: 0 0 22px rgba(212, 169, 74, 0.75), 0 0 4px rgba(240, 199, 106, 0.5); color: var(--gold); }
  }
  header::after {
    content: "✦ · ⸎ · ✦";
    display: block;
    text-align: center;
    color: var(--gold-dim);
    letter-spacing: 0.8em;
    font-size: 9px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    opacity: 0.55;
  }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center; justify-content: center;
  }
  .tab {
    appearance: none;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--ink-dim);
    padding: 9px 20px;
    border-radius: 1px;
    font-family: 'Cinzel', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .tab:hover {
    color: var(--gold-bright);
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(212, 169, 74, 0.35);
  }
  .tab.active {
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: #1a0f00;
    border-color: var(--gold);
    font-weight: 600;
    box-shadow: 0 0 18px rgba(212, 169, 74, 0.45);
  }
  /* Teema-toggle — sama tyyli kuin .tab mutta ei reagoi tab-handleriin */
  .theme-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink-dim);
    padding: 7px 14px;
    border-radius: 1px;
    font-family: 'Cinzel', Georgia, serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .theme-btn:hover {
    color: var(--gold-bright);
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(212, 169, 74, 0.25);
  }

  main { padding: 32px 28px 80px; max-width: 1200px; margin: 0 auto; }

  section { display: none; }
  section.active { display: block; }

  .meta-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ink-dim);
    font-style: italic;
  }
  .meta-bar .count { color: var(--gold); font-style: normal; font-weight: 500; }
  .meta-bar .fetched { color: var(--muted); }

  .event-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 22px;
  }
  .event-card {
    background: linear-gradient(180deg, rgba(74,43,110,0.18), rgba(26,16,42,0.55));
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }
  .event-card:hover {
    border-color: var(--gold);
    box-shadow: 0 0 22px rgba(212,169,74,0.25), var(--shadow);
    transform: translateY(-2px);
  }
  .event-card .thumb {
    aspect-ratio: 16 / 9;
    background: #0a0612 center/cover no-repeat;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .event-card .thumb.no-image {
    background:
      radial-gradient(ellipse at 30% 30%, rgba(74,43,110,0.5), transparent 60%),
      radial-gradient(ellipse at 70% 70%, rgba(139,30,43,0.25), transparent 55%),
      var(--bg-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-dim);
    font-family: 'Cinzel', Georgia, serif;
    font-size: 28px;
    letter-spacing: 0.5em;
  }
  .event-card .body { padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .event-card .date {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .event-card .name {
    font-size: 19px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .event-card .desc {
    font-size: 14px;
    color: var(--ink-dim);
    font-style: italic;
    line-height: 1.45;
    flex: 1;
  }
  .event-card .place {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .event-card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .event-card .tag {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    border: 1px solid var(--border);
    padding: 2px 8px;
  }
  .event-card .link {
    margin-top: 6px;
    font-family: 'Cinzel', Georgia, serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-dim);
    text-decoration: none;
    align-self: flex-start;
    border: 1px solid var(--border);
    padding: 4px 12px;
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .event-card .link:hover {
    color: var(--gold-bright);
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(212,169,74,0.4);
  }

  /* ========== Toolbar (haku, suosikit, hashtagit) ========== */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar .row1 { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .search-input {
    flex: 1;
    min-width: 220px;
    background: rgba(10,6,18,0.6);
    border: 1px solid var(--border-strong);
    color: var(--ink);
    padding: 8px 14px;
    font-family: inherit;
    font-size: 15px;
    border-radius: 1px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: var(--muted); font-style: italic; }
  .search-input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(212,169,74,0.3);
  }
  .fav-toggle {
    appearance: none;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--ink-dim);
    padding: 8px 16px;
    font-family: 'Cinzel', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .fav-toggle:hover {
    color: var(--gold-bright);
    border-color: var(--gold);
  }
  .fav-toggle.active {
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: #1a0f00;
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(212,169,74,0.4);
  }
  .hashtag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .hashtag-row .label {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-right: 6px;
  }
  .hashtag-chip {
    appearance: none;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink-dim);
    font-family: 'Cinzel', Georgia, serif;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 3px 9px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .hashtag-chip:hover {
    color: var(--gold-bright);
    border-color: var(--gold);
  }
  .hashtag-chip.active {
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(212,169,74,0.12);
  }
  .hashtag-clear {
    color: var(--muted);
    font-size: 10px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px 6px;
    font-style: italic;
    text-decoration: underline dotted;
  }
  .hashtag-clear:hover { color: var(--ink-dim); }

  /* ========== Ryhmäotsikko ========== */
  .group-section { margin-bottom: 30px; }
  .group-heading {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 12px 0;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .group-heading .group-count {
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.15em;
    font-weight: normal;
  }

  /* ========== Suosikkisydän korttiin ========== */
  .event-card { position: relative; }
  .fav-heart {
    position: absolute;
    top: 8px; right: 8px;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(10,6,18,0.65);
    color: var(--gold-dim);
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
    transition: color 0.2s, border-color 0.2s, transform 0.15s, background 0.2s;
  }
  .fav-heart:hover {
    color: var(--gold-bright);
    border-color: var(--gold);
    transform: scale(1.1);
  }
  .fav-heart.active {
    color: var(--blood);
    border-color: var(--blood);
    background: rgba(139,30,43,0.18);
    text-shadow: 0 0 10px rgba(139,30,43,0.6);
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-style: italic;
    font-size: 16px;
  }

  /* Mobiili */
  @media (max-width: 720px){
    
    
    header { top: 36px; padding: 18px 14px 14px; }
    header h1 { font-size: 19px; letter-spacing: 0.14em; margin-bottom: 14px; }
    header h1 .sigil { margin: 0 10px; font-size: 16px; }
    main { padding: 18px 14px 60px; }
    .event-grid { grid-template-columns: 1fr; gap: 16px; }
    .event-card .name { font-size: 17px; }
    .tab { padding: 7px 12px; font-size: 10px; letter-spacing: 0.16em; }
  }

  /* Desktopin luettavuus */
  @media (min-width: 721px){
    body { font-size: 18px; }
    main { padding: 36px 32px 96px; }
  }
</style>

<script>
(function(){
  "use strict";

  // -- Välilehdet
  document.querySelectorAll("header .tab").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = btn.getAttribute("data-target");
      document.querySelectorAll("header .tab").forEach(b => b.classList.toggle("active", b === btn));
      document.querySelectorAll("main section").forEach(s => s.classList.toggle("active", s.id === target));
    });
  });

  // -- Data
  let eventsData;
  try {
    eventsData = JSON.parse(document.getElementById("events-data").textContent || "{}");
  } catch (e) {
    eventsData = { tapahtumat: [] };
  }
  const events = Array.isArray(eventsData.tapahtumat) ? eventsData.tapahtumat : [];

  // -- Apufunktiot
  const WEEKDAYS = ["Su","Ma","Ti","Ke","To","Pe","La"];
  const MONTHS = ["tammi","helmi","maalis","huhti","touko","kesä","heinä","elo","syys","loka","marras","joulu"];

  function parseDate(s) {
    if (!s) return null;
    const d = new Date(s);
    return isNaN(d) ? null : d;
  }

  function formatDate(startStr, endStr) {
    const s = parseDate(startStr);
    if (!s) return "";
    const e = parseDate(endStr);
    const sameDay = e && s.toDateString() === e.toDateString();
    const dateStr = `${WEEKDAYS[s.getDay()]} ${s.getDate()}.${MONTHS[s.getMonth()]}`;
    const timeStr = `${s.getHours().toString().padStart(2,"0")}.${s.getMinutes().toString().padStart(2,"0")}`;
    if (!e) return `${dateStr} klo ${timeStr}`;
    if (sameDay) {
      const eTime = `${e.getHours().toString().padStart(2,"0")}.${e.getMinutes().toString().padStart(2,"0")}`;
      return `${dateStr} klo ${timeStr}–${eTime}`;
    }
    return `${dateStr} klo ${timeStr} – ${WEEKDAYS[e.getDay()]} ${e.getDate()}.${MONTHS[e.getMonth()]}`;
  }

  function stripHtml(s) {
    if (!s) return "";
    const div = document.createElement("div");
    div.innerHTML = s;
    return (div.textContent || "").replace(/\s+/g, " ").trim();
  }

  function truncate(s, n) {
    if (!s) return "";
    if (s.length <= n) return s;
    return s.slice(0, n).replace(/\s+\S*$/, "") + "…";
  }

  // -- Suosikit (localStorage)
  const FAV_KEY = "tampere-events-favorites";
  function loadFavs() {
    try {
      const raw = localStorage.getItem(FAV_KEY);
      return new Set(raw ? JSON.parse(raw) : []);
    } catch { return new Set(); }
  }
  function saveFavs(set) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify([...set])); } catch {}
  }
  let favorites = loadFavs();

  function renderCard(e) {
    const card = document.createElement("article");
    card.className = "event-card";

    // Suosikkisydän
    const heart = document.createElement("button");
    heart.type = "button";
    heart.className = "fav-heart" + (favorites.has(e.id) ? " active" : "");
    heart.title = favorites.has(e.id) ? "Poista suosikeista" : "Lisää suosikkeihin";
    heart.textContent = favorites.has(e.id) ? "♥" : "♡";
    heart.addEventListener("click", (ev) => {
      ev.preventDefault(); ev.stopPropagation();
      if (favorites.has(e.id)) favorites.delete(e.id);
      else favorites.add(e.id);
      saveFavs(favorites);
      rerender();
    });
    card.appendChild(heart);

    const thumb = document.createElement("div");
    if (e.kuva) {
      thumb.className = "thumb";
      thumb.style.backgroundImage = `url("${e.kuva}")`;
    } else {
      thumb.className = "thumb no-image";
      thumb.textContent = "✦";
    }
    card.appendChild(thumb);

    const body = document.createElement("div");
    body.className = "body";

    const date = document.createElement("div");
    date.className = "date";
    date.textContent = formatDate(e.alkaa, e.paattyy);
    body.appendChild(date);

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = e.nimi || "";
    body.appendChild(name);

    if (e.kuvaus) {
      const desc = document.createElement("div");
      desc.className = "desc";
      desc.textContent = truncate(stripHtml(e.kuvaus), 180);
      body.appendChild(desc);
    }

    if (e.paikka) {
      const place = document.createElement("div");
      place.className = "place";
      place.textContent = "📍 " + e.paikka;
      body.appendChild(place);
    }

    if (Array.isArray(e.tagit) && e.tagit.length) {
      const tags = document.createElement("div");
      tags.className = "tags";
      e.tagit.slice(0, 3).forEach(t => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = t;
        tags.appendChild(tag);
      });
      body.appendChild(tags);
    }

    if (e.linkki) {
      const link = document.createElement("a");
      link.className = "link";
      link.href = e.linkki;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = "Lisää tietoja";
      body.appendChild(link);
    }

    card.appendChild(body);
    return card;
  }

  // -- Päivämääräryhmittely
  const FI_MONTHS = ["tammikuu","helmikuu","maaliskuu","huhtikuu","toukokuu","kesäkuu",
                     "heinäkuu","elokuu","syyskuu","lokakuu","marraskuu","joulukuu"];

  function startOfWeekMonday(d) {
    const x = new Date(d);
    x.setHours(0,0,0,0);
    const dow = x.getDay() || 7;  // 1=ma, 7=su
    x.setDate(x.getDate() - (dow - 1));
    return x;
  }

  function groupByDate(items) {
    const now = new Date();
    const thisMon = startOfWeekMonday(now);
    const nextMon = new Date(thisMon); nextMon.setDate(thisMon.getDate() + 7);
    const weekAfter = new Date(thisMon); weekAfter.setDate(thisMon.getDate() + 14);
    const groups = []; // [{key, label, items}]
    const map = {};
    function ensure(key, label, sortKey) {
      if (!map[key]) {
        const g = { key, label, sortKey, items: [] };
        map[key] = g;
        groups.push(g);
      }
      return map[key];
    }
    for (const e of items) {
      const dt = new Date(e.alkaa);
      if (isNaN(dt)) continue;
      let g;
      if (dt < nextMon) {
        g = ensure("tama-vk", "Tällä viikolla", 0);
      } else if (dt < weekAfter) {
        g = ensure("ensi-vk", "Ensi viikolla", 1);
      } else {
        // Kuukauden mukaan
        const yr = dt.getFullYear();
        const mo = dt.getMonth();
        const k = `${yr}-${String(mo).padStart(2,"0")}`;
        const lbl = `${FI_MONTHS[mo].charAt(0).toUpperCase() + FI_MONTHS[mo].slice(1)}${yr !== now.getFullYear() ? " " + yr : ""}`;
        g = ensure(k, lbl, yr * 12 + mo + 100);
      }
      g.items.push(e);
    }
    groups.sort((a, b) => a.sortKey - b.sortKey);
    return groups;
  }

  // -- Filter-tila per välilehti
  const tabState = {
    perhe: { search: "", tags: new Set(), onlyFav: false },
    konsa: { search: "", tags: new Set(), onlyFav: false }
  };

  function eventMatches(e, st) {
    if (st.onlyFav && !favorites.has(e.id)) return false;
    if (st.tags.size > 0) {
      const eTags = new Set((e.tagit || []).map(t => (t || "").toLowerCase()));
      let any = false;
      for (const t of st.tags) {
        if (eTags.has(t)) { any = true; break; }
      }
      if (!any) return false;
    }
    if (st.search) {
      const q = st.search.toLowerCase();
      const haystack = [
        e.nimi || "",
        e.kuvaus || "",
        e.jarjestaja || "",
        e.paikka || "",
        (e.tagit || []).join(" ")
      ].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  }

  function collectHashtags(items) {
    const counts = new Map();
    for (const e of items) {
      for (const t of (e.tagit || [])) {
        const k = (t || "").toLowerCase();
        if (!k) continue;
        counts.set(k, (counts.get(k) || 0) + 1);
      }
    }
    // Lajittele frekvenssin mukaan, top 12
    return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);
  }

  function renderGroups(containerId, items, st, emptyMsg) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    const filtered = items.filter(e => eventMatches(e, st));
    if (!filtered.length) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = emptyMsg;
      container.appendChild(empty);
      return 0;
    }
    const groups = groupByDate(filtered);
    for (const g of groups) {
      const sec = document.createElement("div");
      sec.className = "group-section";
      const h = document.createElement("h3");
      h.className = "group-heading";
      const lbl = document.createElement("span");
      lbl.textContent = g.label;
      const cnt = document.createElement("span");
      cnt.className = "group-count";
      cnt.textContent = `${g.items.length} kpl`;
      h.appendChild(lbl); h.appendChild(cnt);
      sec.appendChild(h);
      const grid = document.createElement("div");
      grid.className = "event-grid";
      g.items.forEach(e => grid.appendChild(renderCard(e)));
      sec.appendChild(grid);
      container.appendChild(sec);
    }
    return filtered.length;
  }

  function renderHashtagRow(rowEl, items, st) {
    rowEl.innerHTML = "";
    const tags = collectHashtags(items);
    if (!tags.length) return;
    const lbl = document.createElement("span");
    lbl.className = "label";
    lbl.textContent = "Tagit:";
    rowEl.appendChild(lbl);
    for (const [t, c] of tags) {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "hashtag-chip" + (st.tags.has(t) ? " active" : "");
      chip.textContent = `${t} (${c})`;
      chip.title = t;
      chip.addEventListener("click", () => {
        if (st.tags.has(t)) st.tags.delete(t); else st.tags.add(t);
        rerender();
      });
      rowEl.appendChild(chip);
    }
    if (st.tags.size > 0) {
      const clr = document.createElement("button");
      clr.type = "button";
      clr.className = "hashtag-clear";
      clr.textContent = "tyhjennä";
      clr.addEventListener("click", () => { st.tags.clear(); rerender(); });
      rowEl.appendChild(clr);
    }
  }

  // -- Suodata tapahtumat ryhmiin
  const nowMs = Date.now();
  const valid = events
    .map(e => ({ ...e, _start: parseDate(e.alkaa)?.getTime() }))
    .filter(e => e._start && e._start >= nowMs - 24*3600*1000)
    .sort((a, b) => a._start - b._start);

  const konsaItems = valid.filter(e =>
    (e.jarjestaja || "").toLowerCase().includes("konservator")
  );
  const perheItems = valid.filter(e => {
    const ages = Array.isArray(e.kohderyhmat) ? e.kohderyhmat : [];
    const hasYoungAge = ages.includes("age-1") || ages.includes("age-2");
    const hasKidsCategory = Array.isArray(e.kategoriat) && e.kategoriat.some(c =>
      (c || "").toLowerCase().includes("kids and family") || (c || "").toLowerCase().includes("lapsi")
    );
    return hasYoungAge || hasKidsCategory;
  });

  function rerender() {
    const np = renderGroups("groups-perhe", perheItems, tabState.perhe,
      "Ei tapahtumia hakuehdoilla.");
    document.getElementById("count-perhe").textContent = np.toString();
    renderHashtagRow(document.querySelector('.hashtag-row[data-tab="perhe"]'), perheItems, tabState.perhe);

    const nk = renderGroups("groups-konsa", konsaItems, tabState.konsa,
      "Ei konservatorion tapahtumia hakuehdoilla.");
    document.getElementById("count-konsa").textContent = nk.toString();
    renderHashtagRow(document.querySelector('.hashtag-row[data-tab="konsa"]'), konsaItems, tabState.konsa);

    // Päivitä suosikkitogglen tila visuaalisesti
    document.querySelectorAll(".fav-toggle").forEach(b => {
      const tab = b.getAttribute("data-tab");
      b.classList.toggle("active", tabState[tab].onlyFav);
    });
  }

  // -- Kytke toolbarin nappit
  document.querySelectorAll(".search-input").forEach(inp => {
    const tab = inp.getAttribute("data-tab");
    inp.addEventListener("input", () => {
      tabState[tab].search = inp.value.trim();
      rerender();
    });
  });
  document.querySelectorAll(".fav-toggle").forEach(b => {
    b.addEventListener("click", () => {
      const tab = b.getAttribute("data-tab");
      tabState[tab].onlyFav = !tabState[tab].onlyFav;
      rerender();
    });
  });

  rerender();

  // -- Haettu-aikaleima
  if (eventsData.haettu) {
    const d = parseDate(eventsData.haettu);
    if (d) {
      const label = `Päivitetty ${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()} klo ${d.getHours().toString().padStart(2,"0")}.${d.getMinutes().toString().padStart(2,"0")}`;
      document.getElementById("fetched-perhe").textContent = label;
      document.getElementById("fetched-konsa").textContent = label;
    }
  }
})();

// ---------- teema (jaettu logiikka index.html:n kanssa) ----------
const THEME_KEY = "ruokalista-theme";
function applyTheme(theme) {
  if (theme === "light") {
    document.documentElement.setAttribute("data-theme", "light");
  } else {
    document.documentElement.removeAttribute("data-theme");
  }
  const icon = document.getElementById("themeIcon");
  const label = document.getElementById("themeLabel");
  if (icon && label) {
    if (theme === "light") {
      icon.textContent = "☽";
      label.textContent = "Tumma";
    } else {
      icon.textContent = "☉";
      label.textContent = "Vaalea";
    }
  }
}
function toggleTheme() {
  const current = localStorage.getItem(THEME_KEY) || "dark";
  const next = current === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}
(function initTheme() {
  let saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch {}
  applyTheme(saved || "dark");
})();
</script>
